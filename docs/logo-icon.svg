<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Square icon mark — for favicon, app icon, social -->
  <defs>
    <linearGradient id="gi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a87c"/>
      <stop offset="100%" stop-color="#a08460"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0c0b0a"/>

  <!-- Mic body -->
  <rect x="24" y="12" width="16" height="24" rx="8" fill="url(#gi)"/>

  <!-- Mic arc -->
  <path d="M18 32 C18 44, 46 44, 46 32" stroke="#c9a87c" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Stand -->
  <line x1="32" y1="44" x2="32" y2="50" stroke="#c9a87c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Mute slash -->
  <line x1="14" y1="12" x2="50" y2="52" stroke="#c25d4e" stroke-width="3.5" stroke-linecap="round"/>
</svg>
