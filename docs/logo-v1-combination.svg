<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Combination mark: Key icon + "KeyMute" wordmark -->
  <!-- Icon: stylized key shape merged with a mic slash -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a87c"/>
      <stop offset="100%" stop-color="#a08460"/>
    </linearGradient>
  </defs>

  <!-- Key/Mic hybrid icon -->
  <g transform="translate(12, 12)">
    <!-- Mic body (rounded rect) -->
    <rect x="16" y="4" width="16" height="28" rx="8" fill="url(#g1)"/>
    <!-- Mic stand arc -->
    <path d="M12 28 C12 40, 36 40, 36 28" stroke="#c9a87c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Stand line -->
    <line x1="24" y1="40" x2="24" y2="48" stroke="#c9a87c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Slash / mute line -->
    <line x1="10" y1="8" x2="38" y2="44" stroke="#c25d4e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="72" y="52" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="-1" fill="#e8e4df">Key<tspan fill="#c9a87c" font-family="Georgia, 'Newsreader', serif" font-style="italic" font-weight="400">Mute</tspan></text>
</svg>
